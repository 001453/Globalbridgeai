services:
  qvac-service:
    build: ./qvac-service
    ports:
      - "8765:8765"
    environment:
      - QVAC_BRIDGE_HOST=0.0.0.0
      - QVAC_BRIDGE_PORT=8765
      - QVAC_LLM_MODEL=QWEN3_600M_INST_Q4
    volumes:
      - qvac-cache:/root/.qvac
    restart: unless-stopped
    profiles:
      - sovereign

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./backend/data:/app/data
      - whisper-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/api/v1/ws/live
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: globalbridge
      POSTGRES_PASSWORD: globalbridge
      POSTGRES_DB: globalbridge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    profiles:
      - production

volumes:
  whisper-cache:
  pgdata:
  qvac-cache:
